model_name: Gen6_1

model:
  max_prediction_length: 60
  min_encoder_length: 50
  max_encoder_length: 180
  hidden_size: 128
  attention_head_size: 4
  dropout: 0.3
  learning_rate: 0.001
  lstm_layers: 2
  use_quantile_loss: true
  quantiles: [0.1, 0.5, 0.9]
  embedding_sizes:
    Sector: [12, 6]
    Day_of_Week: [7, 4]
    Month: [12, 6]
  sectors:
    - Technology
    - Healthcare
    - Financials
    - Consumer Discretionary
    - Consumer Staples
    - Energy
    - Utilities
    - Industrials
    - Materials
    - Communication Services
    - Real Estate
    - Unknown
  tuning:
    min_hidden_size: 64
    max_hidden_size: 128
    min_hidden_continuous_size: 64
    max_hidden_continuous_size: 128
    min_lstm_layers: 1
    max_lstm_layers: 2
    min_attention_head_size: 2
    max_attention_head_size: 4
    min_dropout: 0.1
    max_dropout: 0.3
    min_learning_rate: 1e-5
    max_learning_rate: 1e-3

training:
  seed: 42
  max_epochs: 100
  optuna_trials: 5
  num_workers: 4
  prefetch_factor: 2
  early_stopping_patience: 10
  reduce_lr_patience: 3
  reduce_lr_factor: 0.6
  weight_decay: 0.13
  batch_size: 128
  auto_batch_size: true
  batch_size_candidates: [256, 192, 128, 96, 64, 48, 32, 24, 16, 8, 4, 2, 1]
  max_vram_usage: 0.8
  accelerator: auto
  precision: auto

training_universe:
  minimum_group_tickers: 2
  minimum_group_tickers_abs: 2
  minimum_group_coverage_ratio: 0.8
  minimum_rows_per_ticker: 241
  minimum_common_overlap_days: 80
  abort_if_anchor_missing: true
  abort_if_too_many_fallback_tickers: true
  abort_on_cached_backfill: false
  allow_degraded_universe: false
  maximum_fallback_tickers: 0
  maximum_fallback_ratio: 0.0

prediction:
  years: 3
  batch_size: 128
  accelerator: auto
  precision: auto
  future_dates_mode: approximate_business_days

backtesting_runtime:
  accelerator: auto
  precision: auto
  execution_backend: gpu_full
  inference_backend: gpu_batched
  allow_cpu_fallback_live: true
  allow_cpu_fallback_frozen: false
  parity_check_sample_windows: 0
  emit_runtime_trace: true

validation:
  debug: false
  enable_detailed_validation: false
  max_validation_batches_to_log: 2
  save_plots: true
  max_plots_per_epoch: 3

data:
  valid_regions: [poland, europe, usa, global, all]
  raw_data_path: artifacts/training/Gen6_1/active/market/stock_data.csv
  processed_data_path: artifacts/training/Gen6_1/active/dataset/processed_dataset.pt
  tickers_file: config/tickers_with_names.yaml
  benchmark_tickers_file: config/benchmark_tickers.yaml
  train_processed_df_path: artifacts/training/Gen6_1/active/dataset/train_processed_df.parquet
  val_processed_df_path: artifacts/training/Gen6_1/active/dataset/val_processed_df.parquet

data_fetch:
  max_workers: 1
  retries: 4
  timeout: 10.0
  min_delay: 0.35
  max_intraday_lookback_days: 60
  allow_partial_intraday: false
  repair: true
  auto_reset_cookie_cache: true
  trust_env_proxies: false
  use_yfinance_sector_lookup: false
  session_backend: requests
  yfinance_cache_dir: var/cache/yfinance
  rate_limit_cooldown_seconds: 8.0
  rate_limit_circuit_breaker_threshold: 2
  rate_limit_circuit_breaker_seconds: 30.0

paths:
  data_dir: data
  artifacts_dir: artifacts
  training_artifacts_dir: artifacts/training
  benchmark_storage_dir: artifacts/benchmarks
  backtest_storage_dir: artifacts/backtests/econ
  cache_dir: var/cache
  tmp_dir: var/tmp
  logs_root_dir: var/logs
  python_cache_dir: var/cache/python
  matplotlib_cache_dir: var/cache/matplotlib
  pytest_tmp_dir: var/tmp/pytest
  training_catalog_path: artifacts/training/catalog.yaml
  models_dir: artifacts/training/Gen6_1/active/checkpoints
  normalizers_dir: artifacts/training/Gen6_1/active/normalizers
  config_dir: config
  runtime_profiles_dir: config/runtime_profiles
  training_universes_path: config/training_universes.yaml
  model_registry_path: config/model_registry.yaml
  logs_dir: var/logs/training/Gen6_1/latest
  optuna_dir: artifacts/training/Gen6_1/active/optuna
  benchmark_history_db_path: data/benchmarks_history.sqlite

artifacts:
  require_hash_validation: true
