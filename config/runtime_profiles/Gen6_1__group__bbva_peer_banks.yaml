model_name: Gen6_1__group__bbva_peer_banks
model:
  max_prediction_length: 60
  min_encoder_length: 50
  max_encoder_length: 180
  hidden_size: 128
  attention_head_size: 4
  dropout: 0.3
  learning_rate: 0.001
  lstm_layers: 2
  use_quantile_loss: true
  quantiles:
  - 0.1
  - 0.5
  - 0.9
  embedding_sizes:
    Sector:
    - 12
    - 6
    Day_of_Week:
    - 7
    - 4
    Month:
    - 12
    - 6
  sectors:
  - Technology
  - Healthcare
  - Financials
  - Consumer Discretionary
  - Consumer Staples
  - Energy
  - Utilities
  - Industrials
  - Materials
  - Communication Services
  - Real Estate
  - Unknown
  tuning:
    min_hidden_size: 64
    max_hidden_size: 128
    min_hidden_continuous_size: 64
    max_hidden_continuous_size: 128
    min_lstm_layers: 1
    max_lstm_layers: 2
    min_attention_head_size: 2
    max_attention_head_size: 4
    min_dropout: 0.1
    max_dropout: 0.3
    min_learning_rate: 1e-5
    max_learning_rate: 1e-3
training:
  seed: 42
  max_epochs: 100
  optuna_trials: 5
  num_workers: 4
  prefetch_factor: 2
  early_stopping_patience: 10
  reduce_lr_patience: 3
  reduce_lr_factor: 0.6
  weight_decay: 0.13
  batch_size: 128
  auto_batch_size: true
  batch_size_candidates:
  - 256
  - 192
  - 128
  - 96
  - 64
  - 48
  - 32
  - 24
  - 16
  - 8
  - 4
  - 2
  - 1
  max_vram_usage: 0.8
  accelerator: auto
  precision: auto
training_universe:
  minimum_group_tickers: 2
  minimum_group_tickers_abs: 2
  minimum_group_coverage_ratio: 0.8
  minimum_rows_per_ticker: 241
  minimum_common_overlap_days: 80
  abort_if_anchor_missing: true
  abort_if_too_many_fallback_tickers: true
  abort_on_cached_backfill: false
  allow_degraded_universe: false
  maximum_fallback_tickers: 0
  maximum_fallback_ratio: 0.0
  mode: predefined_group
  single_ticker_symbol: null
  predefined_group_name: bbva_peer_banks
  anchor_ticker: BBVA.MC
  label: BBVA + peer set bancario curado
  description: Universo bancario europeo curado para entrenar BBVA frente a peers
    comparables.
  notes: Incluye bancos espanoles y peers europeos liquidos para un modelo sectorial
    acotado.
prediction:
  years: 5
  batch_size: 128
  future_dates_mode: approximate_business_days
validation:
  debug: false
  enable_detailed_validation: false
  max_validation_batches_to_log: 2
  save_plots: true
  max_plots_per_epoch: 3
data:
  valid_regions:
  - poland
  - europe
  - usa
  - global
  - all
